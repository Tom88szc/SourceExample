# Where to put your real URLs:
# Replace the values below with your real service addresses.
# Example:
# endpoint.IsoService=http://host:7003/mobile/hce/wallet_server/v2/IsoService
# endpoint.Token24Service=http://host:7003/mobile/hce/wallet_server/v2/Token24Service

endpoint.IsoService=http://localhost:8080/mock/IsoService
endpoint.Token24Service=http://localhost:8080/mock/Token24Service

http.connect.timeout.ms=10000
http.read.timeout.ms=30000
soap.content.type=text/xml; charset=UTF-8
artifacts.dir=target/artifacts
logging.mask.sensitive=true

# WS-Security profiles are placeholders for phase 2.
# Fill them in when you confirm SOAP version, keystore and algorithms.
ws.profile.GBW.keystore.path=
ws.profile.GBW.keystore.password=
ws.profile.GBW.key.alias=
ws.profile.GBW.key.password=
ws.profile.GBW.signature.enabled=false
ws.profile.GBW.encryption.enabled=false

ws.profile.NSB.keystore.path=
ws.profile.NSB.keystore.password=
ws.profile.NSB.key.alias=
ws.profile.NSB.key.password=
ws.profile.NSB.signature.enabled=false
ws.profile.NSB.encryption.enabled=false
