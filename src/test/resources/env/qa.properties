endpoint.IsoService=http://qa-host:7003/mobile/hce/wallet_server/v2/IsoService
endpoint.Token24Service=http://qa-host:7003/mobile/hce/wallet_server/v2/Token24Service

ws.profile.GBW.keystore.path=/opt/keystores/gbw-keystore.jks
ws.profile.GBW.keystore.password=${GBW_KEYSTORE_PASSWORD}
ws.profile.GBW.key.alias=gbw
ws.profile.GBW.key.password=${GBW_KEY_PASSWORD}
ws.profile.GBW.signature.enabled=true
ws.profile.GBW.encryption.enabled=true

ws.profile.NSB.keystore.path=/opt/keystores/nsb-keystore.jks
ws.profile.NSB.keystore.password=${NSB_KEYSTORE_PASSWORD}
ws.profile.NSB.key.alias=nsb
ws.profile.NSB.key.password=${NSB_KEY_PASSWORD}
ws.profile.NSB.signature.enabled=true
ws.profile.NSB.encryption.enabled=true
