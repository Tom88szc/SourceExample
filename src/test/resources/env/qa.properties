endpoint.IsoService=http://your-qa-host:7003/mobile/hce/wallet_server/v2/IsoService
endpoint.Token24Service=http://your-qa-host:7003/mobile/hce/wallet_server/v2/Token24Service

http.connect.timeout.ms=10000
http.read.timeout.ms=30000
soap.content.type=text/xml; charset=UTF-8
artifacts.dir=target/artifacts
logging.mask.sensitive=true

